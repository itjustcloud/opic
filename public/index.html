<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPIc Scripts</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <p class="eyebrow">OPIc</p>
            <h1>Script Studio</h1>
          </div>
          <button class="icon-button" id="addScriptButton" title="새 스크립트" aria-label="새 스크립트">
            <span aria-hidden="true">＋</span>
          </button>
        </header>

        <div class="filter-grid">
          <label>
            <span>주제</span>
            <select id="topicFilter"></select>
          </label>
          <label>
            <span>유형</span>
            <select id="typeFilter"></select>
          </label>
          <label class="search-field">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="제목, 태그, 문장" autocomplete="off" />
          </label>
        </div>

        <div class="script-list" id="scriptList" aria-label="스크립트 목록"></div>
      </aside>

      <main class="workspace">
        <div class="topbar">
          <div class="segmented" role="tablist" aria-label="보기 선택">
            <button id="studyTab" class="active" type="button">학습</button>
            <button id="editTab" type="button">편집</button>
            <button id="fillersTab" type="button">필러</button>
          </div>
          <div class="status-row">
            <span id="saveStatus" class="save-status">저장됨</span>
            <button id="saveButton" class="primary-button" type="button">저장</button>
          </div>
        </div>

        <section id="editorView" class="view" aria-label="스크립트 편집">
          <div class="editor-layout">
            <form id="scriptForm" class="editor-form">
              <div class="field-row">
                <label>
                  <span>제목</span>
                  <input id="titleInput" name="title" type="text" required />
                </label>
              </div>
              <div class="field-grid">
                <label>
                  <span>주제</span>
                  <input id="topicInput" name="topic" type="text" list="topicOptions" required />
                </label>
                <label>
                  <span>유형</span>
                  <input id="typeInput" name="type" type="text" list="typeOptions" required />
                </label>
                <label>
                  <span>태그</span>
                  <input id="tagsInput" name="tags" type="text" placeholder="쉼표로 구분" />
                </label>
              </div>
              <datalist id="topicOptions"></datalist>
              <datalist id="typeOptions"></datalist>
            </form>

            <div class="sentence-panel">
              <div class="panel-header">
                <h2>문장</h2>
                <button id="addSentenceButton" class="secondary-button" type="button">문장 추가</button>
              </div>
              <div id="sentenceEditor" class="sentence-editor"></div>
            </div>

            <div class="json-panel">
              <div class="panel-header">
                <h2>스크립트 JSON</h2>
                <div class="panel-actions">
                  <button id="refreshScriptJsonButton" class="secondary-button" type="button">새로고침</button>
                  <button id="applyScriptJsonButton" class="primary-button" type="button">JSON 적용</button>
                </div>
              </div>
              <textarea id="scriptJsonTextarea" class="json-textarea" rows="18" spellcheck="false"></textarea>
              <div id="scriptJsonStatus" class="json-status" aria-live="polite"></div>
            </div>

            <div class="danger-row">
              <button id="duplicateButton" class="secondary-button" type="button">복제</button>
              <button id="deleteButton" class="danger-button" type="button">삭제</button>
            </div>
          </div>
        </section>

        <section id="studyView" class="view active" aria-label="학습하기">
          <div class="study-shell">
            <div class="study-header">
              <div>
                <p id="studyMeta" class="eyebrow">-</p>
                <h2 id="studyTitle">스크립트 선택</h2>
              </div>
              <div class="counter" id="studyCounter">0 / 0</div>
            </div>

            <div class="study-mode-switch segmented" aria-label="학습 보기 모드">
              <button id="studySingleModeButton" class="active" type="button">한 문장씩</button>
              <button id="studyFlowModeButton" type="button">전체 흐름</button>
            </div>

            <div id="studyCard" class="study-card">
              <p class="study-label">한국어</p>
              <p id="koreanPrompt" class="korean-prompt">스크립트를 선택하세요.</p>
              <div id="noteBox" class="note-box hidden"></div>
              <div id="englishAnswer" class="english-answer hidden"></div>
            </div>

            <div id="studyFlow" class="study-flow hidden"></div>

            <div class="study-controls">
              <button id="prevSentenceButton" class="icon-action" type="button" title="이전 문장" aria-label="이전 문장">
                <span aria-hidden="true">‹</span>
              </button>
              <button id="toggleEnglishButton" class="primary-button" type="button">영어 보기</button>
              <button id="nextSentenceButton" class="icon-action" type="button" title="다음 문장" aria-label="다음 문장">
                <span aria-hidden="true">›</span>
              </button>
            </div>
          </div>
        </section>

        <section id="fillersView" class="view" aria-label="필러 보기">
          <div class="fillers-shell">
            <div class="fillers-header">
              <div>
                <p class="eyebrow">Fillers</p>
                <h2>오픽 필러 표현</h2>
              </div>
              <div class="counter" id="fillersCounter">0</div>
            </div>

            <div class="fillers-toolbar">
              <label>
                <span>상황</span>
                <select id="fillerCategoryFilter"></select>
              </label>
              <label>
                <span>검색</span>
                <input id="fillerSearchInput" type="search" placeholder="영어, 한글, 용도" autocomplete="off" />
              </label>
            </div>

            <div id="fillersList" class="fillers-list"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="sentenceTemplate">
      <article class="sentence-item">
        <div class="sentence-toolbar">
          <span class="sentence-number"></span>
          <div>
            <button class="mini-button move-up" type="button" title="위로" aria-label="위로">↑</button>
            <button class="mini-button move-down" type="button" title="아래로" aria-label="아래로">↓</button>
            <button class="mini-button remove-sentence" type="button" title="문장 삭제" aria-label="문장 삭제">×</button>
          </div>
        </div>
        <label>
          <span>한글</span>
          <textarea class="sentence-korean" rows="2" required></textarea>
        </label>
        <label>
          <span>영어</span>
          <textarea class="sentence-english" rows="2" required></textarea>
        </label>
        <label>
          <span>메모</span>
          <textarea class="sentence-note" rows="2"></textarea>
        </label>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
